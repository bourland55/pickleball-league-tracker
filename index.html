async function beginWeekSetup() {
    if (activeWeek) { alert('End the current week before starting a new one.'); return; }
    const weekNum = pendingWeekNum || parseInt(document.getElementById('start-week-num')?.value) || ((seasonConfig?.currentWeek||0)+1);
    pendingWeekNum = null;
    setup = { step:'roster', absentIds: new Set(subRequests.map(s=>s.playerId)), subIds: new Set(), roster:[], groups:[], forceInclude: new Set() };
    await db.collection('weeks').add({
        weekNumber: weekNum, year: new Date().getFullYear(),
        status:'setup', groupCount:0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // Listener will fire and re-render; setup.step is set so panel will show
}

function continueSetup() {
    setup.step = 'roster';
    setup.subIds = setup.subIds || new Set();
    renderAdmin();
    renderSetupPanel();
    setTimeout(() => document.getElementById('setup-panel')?.scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

function renderSetupPanel() {
    const el = document.getElementById('setup-panel');
    if (!el) return;

    const ranked   = playersOnly().filter(p=>p.currentRank!=null).sort((a,b)=>a.currentRank-b.currentRank);
    const unranked = playersOnly().filter(p=>p.currentRank==null);
    const subs     = subsOnly();

    if (setup.step==='roster') {
        const absentIds    = new Set(subRequests.map(s=>s.playerId));
        const active       = ranked.filter(p=>!absentIds.has(p.id));
        const absent       = ranked.filter(p=>absentIds.has(p.id));
        const checkedSubs  = subs.filter(p=>setup.subIds.has(p.id));
        const total        = active.length + checkedSubs.length;
        const subsChecked  = checkedSubs.length;
        const subsNeeded   = (4 - (total % 4)) % 4; // subs to reach next multiple of 4
        const overForty    = total > 40;
        const isGood       = !overForty && total > 0 && total % 4 === 0;
        const canAddSub    = !overForty && subsChecked < 3 && total < 40;

        let countColor, countMsg;
        if (total < 4) {
            countColor = '#f87171';
            countMsg   = 'Not enough players — need at least 4.';
        } else if (overForty) {
            countColor = '#f87171';
            const over = total - 40;
            countMsg   = `${total} players — over 40 max. Remove ${over} player${over>1?'s':''}.`;
        } else if (isGood) {
            countColor = 'var(--brand)';
            countMsg   = `${total} players → ${total/4} courts ✓`;
        } else {
            countColor = '#fbbf24';
            const target = total + subsNeeded;
            if (canAddSub && target <= 40) {
                countMsg = `${total} players — add ${subsNeeded} sub${subsNeeded>1?'s':''} to reach ${target} (${target/4} courts)`;
            } else {
                // Can't add enough subs — will trim
                const trimTo = Math.floor(total/4)*4;
                countMsg = `${total} players → trimming ${total-trimTo} to reach ${trimTo} (${trimTo/4} courts)`;
            }
        }

        el.innerHTML = `
            <div class="card p-4 mt-2">
                <h3 class="text-sm font-bold text-white mb-3">Step 1: Review Roster</h3>

                <!-- Running count -->
                <div class="flex items-center justify-between px-4 py-3 rounded-xl mb-4" style="background:var(--bg-deep);border:1px solid var(--border);">
                    <span class="section-label">Count</span>
                    <span class="text-sm font-black" id="roster-count-el" style="color:${countColor};">${countMsg}</span>
                </div>

                <!-- Active players -->
                <h4 class="section-label mb-2">Playing (${active.length})</h4>
                <div class="space-y-0.5 mb-4 max-h-48 overflow-y-auto">
                    ${active.map(p=>`
                        <div class="flex items-center gap-3 px-3 py-1.5">
                            <span class="text-emerald-400 text-xs font-bold">✓</span>
                            <span class="text-sm text-slate-300 flex-1">${p.name}</span>
                            <span class="badge-blue shrink-0">#${p.currentRank}</span>
                        </div>`).join('')}
                </div>

                <!-- Absent -->
                ${absent.length>0?`
                <h4 class="section-label mb-2">Absent — Sub Requested (${absent.length})</h4>
                <div class="space-y-0.5 mb-4">
                    ${absent.map(p=>{
                        const req=subRequests.find(s=>s.playerId===p.id);
                        return `<div class="flex items-center gap-3 px-3 py-1.5">
                            <span class="badge-amber shrink-0">OUT</span>
                            <span class="text-sm text-slate-500 flex-1">${p.name}</span>
                            ${req?.reason?`<span class="text-xs text-slate-600 italic">${req.reason}</span>`:''}
                        </div>`;
                    }).join('')}
                </div>`:''}

                <!-- Subs section -->
                <div class="flex items-center justify-between mb-2">
                    <h4 class="section-label">Subs — add to bottom of roster (max 3)</h4>
                    <span class="text-xs font-bold" style="color:${subsChecked===3?'#fbbf24':'var(--text-label)'};">${subsChecked}/3</span>
                </div>

                <!-- Add new sub inline -->
                <div class="flex gap-2 mb-3">
                    <input id="new-sub-name" type="text" placeholder="New sub name…" class="input-dark flex-1" style="padding:0.4rem 0.75rem;"
                        onkeydown="if(event.key==='Enter')addSubPlayer()" />
                    <button onclick="addSubPlayer()" class="text-sm font-semibold text-blue-400 border border-blue-500/40 px-3 py-1.5 rounded-xl hover:bg-blue-500/10 transition-colors whitespace-nowrap">+ Add Sub</button>
                </div>

                ${subs.length>0?`
                <div class="space-y-0.5 mb-4">
                    ${subs.map(p=>{
                        const checked  = setup.subIds.has(p.id);
                        const disabled = !checked && !canAddSub;
                        return `
                        <label class="flex items-center gap-3 px-3 py-2 rounded-lg ${disabled?'opacity-35 cursor-not-allowed':'hover:bg-slate-700/20 cursor-pointer'} transition-colors">
                            <input type="checkbox" id="sc-${p.id}" ${checked?'checked':''} ${disabled?'disabled':''} class="w-4 h-4 accent-blue-400" onchange="toggleSub('${p.id}',this.checked)" />
                            <span class="text-sm ${disabled?'text-slate-500':'text-blue-400'} flex-1">${p.name}</span>
                            <span class="text-xs ${disabled?'text-slate-600':'text-blue-500'}">Sub</span>
                        </label>`;
                    }).join('')}
                </div>`:`
                <p class="text-xs text-slate-500 italic mb-4 px-1">No subs yet — add one above.</p>`}

                <button onclick="buildGroups()" class="btn-primary" ${overForty||total<4?'disabled style="opacity:0.5;cursor:not-allowed;"':''}>Build Groups →</button>
            </div>`;
    } else if (setup.step==='groups') {
        const trimWarning = setup.trimmedPlayers?.length > 0
            ? `<div class="rounded-xl p-3 mb-3" style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);">
                   <p class="text-xs text-amber-400 font-semibold mb-0.5">&#9888; ${setup.trimmedPlayers.length} player${setup.trimmedPlayers.length>1?'s':''} removed to reach a multiple of 4:</p>
                   <p class="text-xs text-amber-500">${setup.trimmedPlayers.join(', ')}</p>
               </div>` : '';
        el.innerHTML = `
            <div class="card p-4 mt-2">
                <h3 class="text-sm font-bold text-white mb-1">Step 2: Review Groups & Courts</h3>
                <p class="text-xs text-slate-400 mb-3">${setup.groups.length} groups · ${setup.groups.length*4} players · Courts are suggested — adjust if needed.</p>
                ${trimWarning}
                <div class="space-y-2 mb-4">
                    ${setup.groups.map((g,i)=>`
                        <div class="rounded-xl p-3" style="background:var(--bg-deep);border:1px solid var(--border);">
                            <div class="flex items-center justify-between mb-1.5">
                                <span class="text-sm font-bold text-white">Group ${String.fromCharCode(65+i)}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-slate-400">Court:</span>
                                    <input type="number" min="1" max="20" value="${g.court}"
                                        onchange="setup.groups[${i}].court=parseInt(this.value)||${g.court}"
                                        class="w-14 text-center rounded-lg text-sm font-bold text-white"
                                        style="background:var(--bg-card);border:1px solid var(--border-input);padding:0.2rem 0.4rem;outline:none;"
                                        onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border-input)'" />
                                </div>
                            </div>
                            <div class="text-xs text-slate-400">${g.players.map((p,j)=>`${j+1}. ${p.name}${p.isSub?' (sub)':''}`).join(' · ')}</div>
                        </div>`).join('')}
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setup.step='roster';renderAdmin();renderSetupPanel()" class="btn-outline">← Back</button>
                    <button onclick="showLockConfirm()" class="btn-primary">Lock In Week</button>
                </div>
            </div>`;
    }
}

function toggleSub(id, adding) {
    if (adding) {
        const absentIds   = new Set(subRequests.map(s=>s.playerId));
        const activeCount = playersOnly().filter(p=>p.currentRank!=null&&!absentIds.has(p.id)).length;
        // Enforce max 3 subs and 40 total (fallback guard — UI disables buttons too)
        if (setup.subIds.size >= 3 || activeCount + setup.subIds.size + 1 > 40) {
            document.getElementById(`sc-${id}`).checked = false;
            return;
        }
        setup.subIds.add(id);
    } else {
        setup.subIds.delete(id);
    }
    renderSetupPanel();
}

async function addSubPlayer() {
    const input = document.getElementById('new-sub-name');
    const name  = input?.value.trim();
    if (!name) return;
    if (players.find(p=>p.name.toLowerCase()===name.toLowerCase())) {
        alert(`"${name}" already exists.`); return;
    }
    await db.collection('players').add({
        name, type:'sub', line:null, currentRank:null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value = '';
    // Firestore listener re-renders automatically — new sub appears in list
}

function buildGroups() {
    const absentIds  = new Set(subRequests.map(s=>s.playerId));
    const ranked     = playersOnly().filter(p=>p.currentRank!=null&&!absentIds.has(p.id))
                         .sort((a,b)=>a.currentRank-b.currentRank);
    const activeSubs = subsOnly().filter(p=>setup.subIds.has(p.id));
    const combined   = [...ranked, ...activeSubs].slice(0, 40);
    const target     = Math.floor(combined.length/4)*4;

    setup.trimmedPlayers = combined.slice(target).map(p=>p.name);
    setup.roster = combined.slice(0, target);
    setup.groups = [];
    for (let i=0; i<setup.roster.length; i+=4) {
        const gp = setup.roster.slice(i,i+4).map((p,j)=>({
            id:p.id, name:p.name, rank:p.currentRank||999, position:j+1, isSub:p.type==='sub'
        }));
        setup.groups.push({ groupIndex:setup.groups.length, court:COURT_ORDER[setup.groups.length]||setup.groups.length+1, players:gp });
    }
    setup.step = 'groups';
    renderAdmin(); renderSetupPanel();
}

        <div class="flex justify-between text-slate-300"><span>Week</span><span class="font-bold text-white">${activeWeek.weekNumber}</span></div>
        <div class="flex justify-between text-slate-300"><span>Players</span><span class="font-bold text-white">${setup.groups.length*4}</span></div>
        <div class="flex justify-between text-slate-300"><span>Groups / Courts</span><span class="font-bold text-white">${setup.groups.length}</span></div>
        <div class="flex justify-between text-slate-300"><span>Courts</span><span class="font-bold text-white">${setup.groups.map(g=>`C${g.court}`).join(', ')}</span></div>`;

async function lockWeek() {
    closeModal('modal-lock-confirm');
    if (!activeWeek) return;
    try {
        const ts=firebase.firestore.FieldValue.serverTimestamp(), batch=db.batch();
        batch.update(db.collection('weeks').doc(activeWeek.id),{status:'active',groupCount:setup.groups.length,lockedAt:ts});
        setup.groups.forEach((g,i)=>{
            const docId=`${activeWeek.id}_${i}`;
            const series=SERIES_DEF.map(sc=>({
                num:sc.num, team1:sc.team1, team2:sc.team2, winner:null,
                games:[
                    {num:1,t1Score:null,t2Score:null,available:true},
                    {num:2,t1Score:null,t2Score:null,available:true},
                    {num:3,t1Score:null,t2Score:null,available:false}
                ]
            }));
            batch.set(db.collection('weekGroups').doc(docId),{
                weekId:activeWeek.id, groupIndex:i, court:g.court,
                players:g.players, series, status:'pending'
            });
        });
        await batch.commit();
        setup.step=null;
        setView('this-week');
    } catch(e) { alert('Error locking week: '+e.message); }
}

async function promptEditWeekNum() {
    if (!activeWeek) return;
    const val = prompt(`Change week number (currently ${activeWeek.weekNumber}):`, activeWeek.weekNumber);
    const num = parseInt(val);
    if (!val || isNaN(num) || num < 1) return;
    await db.collection('weeks').doc(activeWeek.id).update({ weekNumber: num });
}

async function endWeek() {
    if (!confirm('Mark Week '+activeWeek.weekNumber+' as complete?')) return;
    const ts = firebase.firestore.FieldValue.serverTimestamp();
    const stats = computeStats();
    const absentPlayerIds = subRequests.map(s => s.playerId);

    // Save this week's results with enhanced stats
    const thisWeekResult = {
        weekNumber: activeWeek.weekNumber,
        completedAt: ts,
        players: stats.map(s => ({ id:s.id, name:s.name, gw:s.gw, gl:s.gl, sw:s.sw, sl:s.sl||0, pf:s.pf, pa:s.pa, lp:s.lp })),
        absentPlayerIds,
        rankings: [] // filled below after season totals computed
    };

    // Temporarily add this result to compute season totals (it isn't in weekResults yet)
    const allResults = [...weekResults.filter(wr => wr.id !== activeWeek.id), { id: activeWeek.id, ...thisWeekResult }];
    const seasonTotals = computeSeasonTotalsFrom(allResults);

    // Determine previous week's rankings for movement indicators
    const prevWeekResult = weekResults.filter(wr => wr.weekNumber < activeWeek.weekNumber)
        .sort((a,b) => b.weekNumber - a.weekNumber)[0];
    const prevRankMap = {};
    if (prevWeekResult?.rankings) {
        prevWeekResult.rankings.forEach(r => { prevRankMap[r.id] = r.rank; });
    }

    // Build rankings snapshot
    thisWeekResult.rankings = seasonTotals.map((p, i) => ({
        id: p.id, rank: i + 1, prevRank: prevRankMap[p.id] || null
    }));

    // Batch write: complete week, save results, sync rankings to shared players collection
    const batch = db.batch();
    batch.update(db.collection('weeks').doc(activeWeek.id), { status: 'complete' });
    batch.set(db.collection('weekResults').doc(activeWeek.id), thisWeekResult);
    seasonTotals.forEach((p, i) => {
        batch.update(db.collection('players').doc(p.id), { currentRank: i + 1 });
    });
    batch.set(db.collection('config').doc('season'), {
        currentWeek: activeWeek.weekNumber, lastUpdated: ts
    }, { merge: true });
    await batch.commit();
    setView('this-week');
}

// Compute season totals from a provided array of weekResult docs (used by endWeek before save)
function computeSeasonTotalsFrom(results) {
    const playerMap = {};
    results.forEach(wr => {
        wr.players.forEach(p => {
            if (!playerMap[p.id]) playerMap[p.id] = { id:p.id, name:p.name, gw:0, gl:0, sw:0, sl:0, pf:0, pa:0, lp:0, absences:0, weeks:{} };
            const m = playerMap[p.id];
            m.gw += p.gw; m.gl += p.gl; m.sw += (p.sw||0); m.sl += (p.sl||0);
            m.pf += (p.pf||0); m.pa += (p.pa||0); m.lp += p.lp;
            m.weeks[wr.weekNumber] = p;
        });
        (wr.absentPlayerIds || []).forEach(pid => {
            if (!playerMap[pid]) {
                const pl = players.find(p=>p.id===pid);
                playerMap[pid] = { id:pid, name:pl?.name||'?', gw:0, gl:0, sw:0, sl:0, pf:0, pa:0, lp:0, absences:0, weeks:{} };
            }
            playerMap[pid].absences++;
        });
    });
    const threshold = leagueSettings.absencePenaltyThreshold ?? 1;
    const penalty   = leagueSettings.absencePenaltyPerOccurrence ?? -10;
    const rows = Object.values(playerMap);
    rows.forEach(p => {
        p.absencePenalty = Math.max(0, p.absences - threshold) * penalty;
        p.totalLP = p.lp + p.absencePenalty;
        p.winPct  = p.gw + p.gl > 0 ? p.gw / (p.gw + p.gl) : 0;
        p.diff    = p.pf - p.pa;
    });
    return rows.sort((a,b) => b.totalLP!==a.totalLP ? b.totalLP-a.totalLP : b.gw-a.gw);
}

// Recompute a specific week's results from raw weekGroups data (for retroactive edits)
async function recomputeWeekResults(weekId) {
    const snap = await db.collection('weekGroups').where('weekId','==',weekId).get();
    const groups = snap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b)=>a.groupIndex-b.groupIndex);
    const stats = computeStats(groups);

    // Preserve absentPlayerIds from existing weekResults doc
    const existing = weekResults.find(wr => wr.id === weekId);
    const absentPlayerIds = existing?.absentPlayerIds || [];
    const weekNumber = existing?.weekNumber || 0;

    const updatedResult = {
        weekNumber,
        completedAt: existing?.completedAt || firebase.firestore.FieldValue.serverTimestamp(),
        players: stats.map(s => ({ id:s.id, name:s.name, gw:s.gw, gl:s.gl, sw:s.sw, sl:s.sl||0, pf:s.pf, pa:s.pa, lp:s.lp })),
        absentPlayerIds,
        rankings: [] // filled by resyncRankings
    };
    await db.collection('weekResults').doc(weekId).set(updatedResult);
    await resyncRankings();
}

// Recompute season totals and sync rankings to shared players collection
async function resyncRankings() {
    // Re-fetch weekResults to get latest
    const wrSnap = await db.collection('weekResults').orderBy('weekNumber').get();
    const allResults = wrSnap.docs.map(d => ({id:d.id,...d.data()}));
    const seasonTotals = computeSeasonTotalsFrom(allResults);

    const ts = firebase.firestore.FieldValue.serverTimestamp();
    const batch = db.batch();

    // Update rankings on the most recent weekResult
    const latest = allResults[allResults.length - 1];
    if (latest) {
        const prevResult = allResults.length > 1 ? allResults[allResults.length - 2] : null;
        const prevRankMap = {};
        if (prevResult?.rankings) prevResult.rankings.forEach(r => { prevRankMap[r.id] = r.rank; });
        const rankings = seasonTotals.map((p, i) => ({ id: p.id, rank: i + 1, prevRank: prevRankMap[p.id] || null }));
        batch.update(db.collection('weekResults').doc(latest.id), { rankings });
    }

    // Sync currentRank to shared players collection
    seasonTotals.forEach((p, i) => {
        batch.update(db.collection('players').doc(p.id), { currentRank: i + 1 });
    });
    batch.set(db.collection('config').doc('season'), {
        currentWeek: latest?.weekNumber || seasonConfig.currentWeek, lastUpdated: ts
    }, { merge: true });
    await batch.commit();
}

function showNukeConfirm() { showModal('modal-nuke-confirm'); }
async function nukeAllData() {
    closeModal('modal-nuke-confirm');
    for (const col of ['weeks','weekGroups','subRequests','weekResults','scoreEdits']) {
        const snap = await db.collection(col).get();
        if (snap.docs.length) {

async function saveInitialRankings() {

    let count = 0;
    playersOnly().forEach(p => {
        const input = document.getElementById(`irank-${p.id}`);

        const rank = parseInt(input.value);
        if (!isNaN(rank) && rank > 0) {
            batch.update(db.collection('players').doc(p.id), { currentRank: rank });
            count++;
        }
    });
    if (count === 0) { alert('Enter at least one ranking.'); return; }
    await batch.commit();
    renderAdmin();
}

// Short display name — adds last initial when duplicate first names exist in the group
function shortName(fullName, allNames) {
    const first = fullName.split(' ')[0];
    const dupes = allNames.filter(n => n.split(' ')[0] === first);
    if (dupes.length > 1) {
        const last = fullName.split(' ').slice(1).join(' ');
        return last ? `${first} ${last[0]}.` : first;
    }
    return first;
}
function lastShortName(fullName, allNames) {
    const last = fullName.split(' ').pop();
    const dupes = allNames.filter(n => n.split(' ').pop() === last);
    if (dupes.length > 1) {
        const first = fullName.split(' ')[0];
        return `${first[0]}. ${last}`;
    }
    return last;
}

// ================================================================
//  THEME TOGGLE — cycle dark → light → cyberpunk → dark
// ================================================================
const THEME_ORDER = ['dark','light','cyberpunk'];
function currentTheme() {
    const c = document.documentElement.classList;
    if (c.contains('light')) return 'light';
    if (c.contains('cyberpunk')) return 'cyberpunk';
    return 'dark';
}
function updateThemeIcon() {
    const btn = document.getElementById('theme-toggle');
    if (!btn) return;
    const now = currentTheme();
    const next = THEME_ORDER[(THEME_ORDER.indexOf(now) + 1) % THEME_ORDER.length];
    const icons = { dark:'☀', light:'⚡', cyberpunk:'☾' };
    const titles = { dark:'Switch to light mode', light:'Switch to cyberpunk mode', cyberpunk:'Switch to dark mode' };
    btn.innerHTML = icons[next];
    btn.title = titles[now];
}
function toggleTheme() {
    const now = currentTheme();
    const next = THEME_ORDER[(THEME_ORDER.indexOf(now) + 1) % THEME_ORDER.length];
    document.documentElement.classList.remove('light','cyberpunk');
    if (next !== 'dark') document.documentElement.classList.add(next);
    localStorage.setItem('bbpl-theme', next);
    updateThemeIcon();
}
